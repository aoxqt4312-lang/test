name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 1. Генерируем ключ и СРАЗУ пушим его в репо, если его нет
      - name: Prepare and Save Keystore
        run: |
          if [ ! -f "app/release.jks" ]; then
            echo "Ключа нет, создаю..."
            keytool -genkeypair -v \
              -keystore app/release.jks \
              -alias mykeyalias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass mypassword \
              -keypass mypassword \
              -dname "CN=Android, O=Android, C=US"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@://github.com"
            git add app/release.jks
            git commit -m "chore: add keystore file"
            git push origin main
          else
            echo "Ключ уже найден."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 2. Сборка релиза. 
      # Мы передаем ВООБЩЕ ВСЕ возможные названия переменных, 
      # которые могут требоваться в твоем build.gradle на 18 строке.
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PKEY_PATH=release.jks \
            -PKEY_PASS=mypassword \
            -PALIAS=mykeyalias \
            -PSTORE_PASS=mypassword \
            -PRELEASE_STORE_FILE=release.jks \
            -PRELEASE_STORE_PASSWORD=mypassword \
            -PRELEASE_KEY_ALIAS=mykeyalias \
            -PRELEASE_KEY_PASSWORD=mypassword \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
            -Pandroid.injected.signing.store.password=mypassword \
            -Pandroid.injected.signing.key.alias=mykeyalias \
            -Pandroid.injected.signing.key.password=mypassword

      # 3. Принудительная подпись и переименование (на случай если Gradle выдал не то имя)
      - name: Sign and Rename APK
        run: |
          # Ищем ЛЮБОЙ созданный apk во всем проекте
          RAW_APK=$(find . -name "*.apk" | grep "release" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ОШИБКА: APK не найден вообще нигде!"
            exit 1
          fi

          echo "Found APK at $RAW_APK. Signing..."
          
          # Подписываем
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks app/release.jks \
            --ks-pass pass:mypassword \
            --ks-key-alias mykeyalias \
            --key-pass pass:mypassword \
            --out app-release.apk \
            "$RAW_APK"

      # 4. Выгружаем
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk
