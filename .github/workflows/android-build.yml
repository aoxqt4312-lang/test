name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare and Save Keystore
        run: |
          if [ ! -f "app/release.jks" ]; then
            echo "Ключа нет, создаю..."
            keytool -genkeypair -v \
              -keystore app/release.jks \
              -alias mykeyalias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass mypassword \
              -keypass mypassword \
              -dname "CN=Android, O=Android, C=US"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@://github.com"
            git add app/release.jks
            git commit -m "chore: add keystore file"
            git push origin main
          else
            echo "Ключ найден."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Собираем БЕЗ проверки подписи внутри Gradle
      - name: Build Release APK
        run: ./gradlew assembleRelease -x validateSigningRelease
        continue-on-error: true # Если все равно ругнется на подпись, пробуем идти дальше

      - name: Sign and Rename APK
        run: |
          # Ищем любой сгенерированный APK (даже если он в папке 'unsigned')
          RAW_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          if [ -z "$RAW_APK" ]; then
            echo "ОШИБКА: APK не найден! Проверь логи сборки выше."
            exit 1
          fi

          echo "Signing $RAW_APK..."
          
          # Насильно подписываем нашим созданным ключом
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks app/release.jks \
            --ks-pass pass:mypassword \
            --ks-key-alias mykeyalias \
            --key-pass pass:mypassword \
            --out app/build/outputs/apk/release/app-release.apk \
            "$RAW_APK"
          
          # Удаляем мусор
          find app/build/outputs/apk/release/ -type f ! -name "app-release.apk" -delete

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
